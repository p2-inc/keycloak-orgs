name: CI Build
on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  build:
    name: Build Project with Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      # Uses -Pintegration-tests, which activates both Cypress E2E tests and the
      # MySQL/MariaDB database-compatibility smoke tests. The cypress-tests profile
      # is kept in pom.xml for backwards compatibility so existing local scripts or
      # external workflows that reference it continue to work unchanged.
      - name: Build with Maven and run Integration Tests
        run: mvn --batch-mode --update-snapshots verify -Pintegration-tests
      - name: Upload JaCoCo Coverage Report as an artifact
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: ${{ github.workspace }}/target/site/jacoco/
          retention-days: 30
      - name: Add JaCoCo Coverage to Action Summary
        uses: jjmrocha/jacoco-summary@v1.1.1
        with:
          jacoco-csv-file: target/site/jacoco/jacoco.csv